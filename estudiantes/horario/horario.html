<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="schedule-module">
        <header class="schedule-header">
            <div class="schedule-title">
                <h1>Horario Escolar</h1>
            </div>
        </header>

        <div class="schedule-container">
            <div class="schedule-grid">
                <div class="grid-header-empty"></div>
                <div class="grid-day">Lunes</div>
                <div class="grid-day">Martes</div>
                <div class="grid-day">Miércoles</div>
                <div class="grid-day">Jueves</div>
                <div class="grid-day">Viernes</div>

                <div class="grid-time">07:00 AM</div>

                <div class="grid-subject math">
                    <span class="subject-name">Matemáticas</span>
                    <span class="subject-teacher">Prof. Martínez</span>
                </div>

                <div class="grid-subject biology">
                    <span class="subject-name">Biología</span>
                    <span class="subject-location">Laboratorio 1</span>
                </div>

                <div class="grid-subject literature">
                    <span class="subject-name">Literatura</span>
                    <span class="subject-teacher">Prof. Rodríguez</span>
                </div>

                <div class="grid-subject english">
                    <span class="subject-name">Inglés</span>
                    <span class="subject-location">Salón 301</span>
                </div>

                <div class="grid-subject arts">
                    <span class="subject-name">Artes</span>
                    <span class="subject-teacher">Mtro. Goya</span>
                </div>
                
                <div class="grid-time">09:00 AM</div>
                <div class="grid-break">
                    <span>RECESO / DESCANSO</span>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
