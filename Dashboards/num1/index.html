<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard N1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="inline">
            <h2 class="logo-title">
                <img src="./logo.png" class="logo-icon">
                <span class="text-left">Optim<span class="text-right">Scul</span></span> 
            </h2>
        </div>
        <nav class="nav-menu">
            <div class="nav-item">
                <i data-lucide="layout-dashboard"></i>
                <span>Inicio</span>
            </div>

            <div class="nav-group">
                <div class="nav-item dropdown-trigger">
                    <i data-lucide="users"></i>
                    <span>Usuarios</span>
                    <i data-lucide="chevron-down" class="chevron"></i>
                </div>

                <div class="submenu">
                    <a href="" class="submenu-item">Estudiantes</a>
                    <a href="" class="submenu-item">Profesores</a>
                    <a href="" class="submenu-item">Acudientes</a>
                </div>
            </div>

            <div class="nav-item">
                <i data-lucide="clipboard-list"></i>
                <span>Asignaciones</span>
            </div>

            <div class="nav-item">
                <i data-lucide="clipboard-list"></i>
                <span>Reportes</span>
            </div>
        </nav>
    </aside>
</body>
</html>
