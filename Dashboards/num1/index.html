<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard N1</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <h2 class="logo-title">
                <img src="../../RefactorPagina/paginaPrincipal/logo.png" class="logo-icon">
                <span class="text-logo">OptimScul</span>
            </h2>
        </div>
        <nav class="nav-menu">
            <div class="nav-item">
                <i data-lucide="layout-dashboard"></i>
                <span>Inicio</span>
            </div>

            <div class="nav-group">
                <div class="nav-item dropdown-trigger">
                    <i data-lucide="users"></i>
                    <span>Usuarios</span>
                    <i data-lucide="chevron-down" class="chevron"></i>
                </div>

                <div class="submenu">
                    <a href="" class="submenu-item">Estudiantes</a>
                    <a href="" class="submenu-item">Profesores</a>
                    <a href="" class="submenu-item">Acudientes</a>
                </div>
            </div>

            <div class="nav-item">
                <i data-lucide="clipboard-list"></i>
                <span>Asignaciones</span>
            </div>

            <div class="nav-item">
                <i data-lucide="clipboard-list"></i>
                <span>Reportes</span>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="page-title">
                <h1>Bienvenido</h1>
            </div>
            <div class="user-actions">
                <div class="user-meta">
                    <span class="user-name">Carlos</span>
                    <span class="user-role">Administrador</span>
                </div>
                <button class="logout-btn">Cerrar Sesión</button>
            </div>
        </header>

        <section class="dashboard-grid">
            <div class="stats-container">
                <div class="stat-card">
                    <span>Estudiantes</span>
                    <strong>325</strong>
                </div>
                <div class="stat-card">
                    <span>Profesores</span>
                    <strong>45</strong>
                </div>
                <div class="stat-card">
                    <span>Tareas Pendientes</span>
                    <strong>12</strong>
                </div>
                <div class="stat-card">
                    <span>Asistencias hoy</span>
                    <strong>96%</strong>
                </div>
            </div>

            <div class="activity-section">
                <h2>Actividades Recientes</h2>
                <div class="activity-list">
                    <div class="activity-log">
                        <p>Nuevo curso agregado: Matematicas 9°</p>
                    </div>
                    <div class="activity-log">
                        <p>Profesor asignado</p>
                    </div>
                    <div class="activity-log">
                        <p>Estudiante asignado</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
