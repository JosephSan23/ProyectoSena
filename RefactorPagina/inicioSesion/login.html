<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="brand-panel">
            <div class="brand-content">
                <h2 class="logo-title">
            <img src="../paginaPrincipal/logo.png" class="logo-icon">
            <span class="text-left">Optim<span class="text-right">Scul</span></span>
           
        </h2>
                <p id="inspiring-quote">Optimizando el futuro de la educación.</p>
            </div>
        </div>

        <div class="form-panel">
            <form class="login-form">
                <h2>Ingresa a OptimScul</h2>
                <p class="welcome-text">Bienvenido de nuevo. Por favor, introduce tus credenciales.</p>
                
                <div class="input-group">
                    <label for="user">Correo o Usuario</label>
                    <input type="text" id="user" name="user" placeholder="ejemplo@dominio.com" required>
                </div>

                <div class="input-group">
                    <div class="password-header">
                        <label for="pass">Contraseña</label>
                        <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <input type="password" id="pass" name="pass" placeholder="********" required>
                </div>
                
                <button type="submit" class="btn-log">Iniciar Sesión</button>

                <p class="visitor-text">¿No formas parte de una institucion?
                    <a href="#">Contáctanos o postula a un estudiante aquí</a>
                </p>

            </form>
        </div>
    </div>
</body>
</html>
